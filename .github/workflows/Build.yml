name: Build llama.cpp for Kindle (ARMv7 musl softfloat static)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggerganov/llama.cpp
          ref: master

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake make wget tar xz-utils

      - name: Download musl soft float cross toolchain
        run: |
          wget --timeout=60 https://musl.cc/arm-linux-musleabi-cross.tgz || \
          wget --timeout=60 https://github.com/just-containers/musl-cross-make/releases/download/v15/gcc-9.2.0-arm-linux-musleabi.tar.xz
          ls *.tgz *.tar.xz 2>/dev/null
          tar -xzf arm-linux-musleabi-cross.tgz 2>/dev/null || tar -xJf gcc-9.2.0-arm-linux-musleabi.tar.xz 2>/dev/null
          find . -name "arm-linux-musleabi-gcc" 2>/dev/null

      - name: Configure
        run: |
          GCC=$(realpath $(find . -name "arm-linux-musleabi-gcc" | head -1))
          GXX=$(realpath $(find . -name "arm-linux-musleabi-g++" | head -1))
          echo "GCC: $GCC"
          echo "GXX: $GXX"
          cmake -B build \
            -DCMAKE_C_COMPILER=$GCC \
            -DCMAKE_CXX_COMPILER=$GXX \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=armv7 \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=ON \
            -DGGML_NATIVE=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_OPENMP=OFF \
            -DCMAKE_EXE_LINKER_FLAGS="-static"

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Collect binaries
        run: |
          mkdir -p artifacts
          cp build/bin/llama-cli artifacts/ || true
          cp build/bin/llama-simple artifacts/ || true
          file artifacts/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-kindle-armv7-musl-softfloat
          path: artifacts/
          retention-days: 30
