name: Build llama.cpp for Kindle (ARMv7 musl static)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggerganov/llama.cpp
          ref: master

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake make wget tar xz-utils gcc g++ bison flex texinfo

      - name: Build musl cross toolchain from source
        run: |
          git clone https://github.com/richfelker/musl-cross-make.git
          cd musl-cross-make
          printf 'TARGET = arm-linux-musleabihf\nCOMMON_CONFIG += CFLAGS="-g0 -O2" CXXFLAGS="-g0 -O2" LDFLAGS="-s"\nGCC_CONFIG += --with-arch=armv7-a --with-cpu=cortex-a9 --with-fpu=vfpv3 --with-float=hard --disable-nls\n' > config.mak
          cat config.mak
          make -j$(nproc)
          make install OUTPUT=$PWD/../toolchain
          echo "--- toolchain bin ---"
          ls ../toolchain/bin/

      - name: Configure llama.cpp
        run: |
          GCC=$(realpath toolchain/bin/arm-linux-musleabihf-gcc)
          GXX=$(realpath toolchain/bin/arm-linux-musleabihf-g++)
          echo "GCC: $GCC"
          echo "GXX: $GXX"
          cmake -B build \
            -DCMAKE_C_COMPILER=$GCC \
            -DCMAKE_CXX_COMPILER=$GXX \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=armv7 \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=ON \
            -DGGML_NATIVE=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_OPENMP=OFF \
            -DCMAKE_C_FLAGS="-march=armv7-a -mcpu=cortex-a9 -mfpu=vfpv3 -mfloat-abi=hard" \
            -DCMAKE_CXX_FLAGS="-march=armv7-a -mcpu=cortex-a9 -mfpu=vfpv3 -mfloat-abi=hard" \
            -DCMAKE_EXE_LINKER_FLAGS="-static"

      - name: Build llama.cpp
        run: cmake --build build --config Release -j$(nproc)

      - name: Collect binaries
        run: |
          mkdir -p artifacts
          cp build/bin/llama-cli artifacts/ || true
          cp build/bin/llama-simple artifacts/ || true
          file artifacts/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-kindle-armv7-cortex-a9
          path: artifacts/
          retention-days: 30
