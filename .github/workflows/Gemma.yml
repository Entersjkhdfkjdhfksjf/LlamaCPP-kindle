name: Quantize Gemma GGUF model

on:
  workflow_dispatch:

jobs:
  quantize:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake make gcc g++ wget

      - name: Build llama.cpp natively
        run: |
          git clone https://github.com/ggerganov/llama.cpp.git
          cd llama.cpp
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=ON \
            -DGGML_NATIVE=OFF
          cmake --build build --config Release -j$(nproc) --target llama-quantize

      - name: Download Q8 model
        run: |
          wget https://huggingface.co/ggml-org/gemma-3-270m-GGUF/resolve/main/gemma-3-270m-Q8_0.gguf
          ls -lh *.gguf

      - name: Quantize
        run: |
          ./llama.cpp/build/bin/llama-quantize gemma-3-270m-Q8_0.gguf gemma-3-270m-Q4_K_M.gguf Q4_K_M
          ./llama.cpp/build/bin/llama-quantize gemma-3-270m-Q8_0.gguf gemma-3-270m-Q2_K.gguf Q2_K
          ls -lh *.gguf

      - name: Upload quantized models
        uses: actions/upload-artifact@v4
        with:
          name: gemma-3-270m-quantized
          path: |
            gemma-3-270m-Q4_K_M.gguf
            gemma-3-270m-Q2_K.gguf
          retention-days: 30
